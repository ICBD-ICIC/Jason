<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kialo Debate Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0e0f11;
    --surface:     #16181c;
    --border:      #2a2d35;
    --text:        #e8e6e1;
    --muted:       #6b6f7a;
    --root-bg:     #1e2028;
    --root-border: #4a4f5e;
    --root-glow:   rgba(200,200,220,0.08);
    --pro-bg:      #0d1f14;
    --pro-border:  #2d6e42;
    --pro-glow:    rgba(45,110,66,0.15);
    --pro-accent:  #4caf70;
    --con-bg:      #1f0d0d;
    --con-border:  #7a2d2d;
    --con-glow:    rgba(122,45,45,0.15);
    --con-accent:  #e05555;
    --connector:   #2a2d35;
    --poll-dot:    #4caf70;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  header h1 em {
    font-style: italic;
    color: var(--muted);
  }

  .status-bar {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  .poll-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .poll-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--poll-dot);
    animation: pulse 2s ease-in-out infinite;
  }

  .poll-dot.error { background: var(--con-accent); animation: none; }
  .poll-dot.idle  { background: var(--muted); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  .legend {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  /* ── Main canvas ── */
  main {
    padding: 32px 28px 60px;
  }

  #empty-state {
    margin-top: 80px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  #empty-state .big {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--border);
    margin-bottom: 12px;
  }

  /* ── Tree layout ── */
  .tree-roots {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  /* Each root's subtree */
  .tree-root-block {}

  /* Recursive node + children */
  .node-block {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .node-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  /* The vertical+horizontal connector lines */
  .connector-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 32px;
    flex-shrink: 0;
    position: relative;
  }

  .connector-v {
    width: 1px;
    background: var(--connector);
    flex: 1;
    min-height: 100%;
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
  }

  .connector-h {
    width: 100%;
    height: 1px;
    background: var(--connector);
    margin-top: 24px; /* aligns with node vertical center */
    flex-shrink: 0;
  }

  .children-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-left: 40px;
    padding-top: 8px;
    border-left: 1px solid var(--connector);
    margin-left: 20px;
    margin-top: 0;
  }

  /* ── Node card ── */
  .node-card {
    position: relative;
    border-radius: 6px;
    border: 1px solid;
    padding: 12px 14px;
    max-width: 640px;
    cursor: default;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
    animation: nodeIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes nodeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .node-card:hover {
    transform: translateY(-1px);
  }

  .node-card.root {
    background: var(--root-bg);
    border-color: var(--root-border);
    box-shadow: 0 0 20px var(--root-glow);
  }
  .node-card.root:hover {
    box-shadow: 0 4px 24px var(--root-glow), 0 0 0 1px var(--root-border);
  }

  .node-card.pro {
    background: var(--pro-bg);
    border-color: var(--pro-border);
    box-shadow: 0 0 16px var(--pro-glow);
  }
  .node-card.pro:hover {
    box-shadow: 0 4px 20px var(--pro-glow), 0 0 0 1px var(--pro-border);
  }

  .node-card.con {
    background: var(--con-bg);
    border-color: var(--con-border);
    box-shadow: 0 0 16px var(--con-glow);
  }
  .node-card.con:hover {
    box-shadow: 0 4px 20px var(--con-glow), 0 0 0 1px var(--con-border);
  }

  /* Relation label pill */
  .relation-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 3px;
    padding: 2px 6px;
    margin-bottom: 7px;
  }

  .relation-pill.root { background: rgba(74,79,94,0.3); color: var(--muted); }
  .relation-pill.pro  { background: rgba(76,175,112,0.15); color: var(--pro-accent); }
  .relation-pill.con  { background: rgba(224,85,85,0.15);  color: var(--con-accent); }

  /* Content */
  .node-content {
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Meta row */
  .node-meta {
    margin-top: 9px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .node-author {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .node-id {
    font-size: 9px;
    color: var(--border);
    letter-spacing: 0.06em;
  }

  .node-reactions {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .reaction-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: rgba(255,255,255,0.03);
  }

  /* ── Stats bar ── */
  #stats {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  #stats span { display: flex; align-items: center; gap: 5px; }
  #stats strong { color: var(--text); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Kialo <em>debate tree</em></h1>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--root-border)"></div>
      <span style="color:var(--muted);font-size:11px">root</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--pro-accent)"></div>
      <span style="color:var(--muted);font-size:11px">pro</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--con-accent)"></div>
      <span style="color:var(--muted);font-size:11px">con</span>
    </div>
  </div>
  <div class="status-bar">
    <div class="poll-indicator">
      <div class="poll-dot idle" id="poll-dot"></div>
      <span id="poll-label">connecting…</span>
    </div>
    <span id="last-update" style="display:none"></span>
  </div>
</header>

<main>
  <div id="stats" style="display:none">
    <span>nodes <strong id="stat-total">0</strong></span>
    <span style="color:var(--pro-accent)">▲ pro <strong id="stat-pro">0</strong></span>
    <span style="color:var(--con-accent)">▼ con <strong id="stat-con">0</strong></span>
    <span>roots <strong id="stat-root">0</strong></span>
  </div>

  <div id="empty-state">
    <div class="big">∅</div>
    waiting for messages…
  </div>

  <div id="tree" class="tree-roots"></div>
</main>

<script>
const API = 'http://localhost:8765/messages';
const POLL_MS = 2000;

let lastData = null;  // JSON string of previous fetch, to skip identical re-renders

// ── Polling ────────────────────────────────────────────────────────────────

async function fetchMessages() {
  const dot   = document.getElementById('poll-dot');
  const label = document.getElementById('poll-label');
  try {
    const res  = await fetch(API);
    const data = await res.json();

    dot.className   = 'poll-dot';
    label.textContent = 'live';

    const serialized = JSON.stringify(data);
    if (serialized !== lastData) {
      lastData = serialized;
      render(data);
      updateStats(data);
    }

    const now = new Date();
    const el = document.getElementById('last-update');
    el.style.display = '';
    el.textContent = `updated ${now.toLocaleTimeString()}`;

  } catch (e) {
    dot.className   = 'poll-dot error';
    label.textContent = 'no connection';
  }
}

setInterval(fetchMessages, POLL_MS);
fetchMessages();

// ── Stats ──────────────────────────────────────────────────────────────────

function updateStats(messages) {
  const statsEl = document.getElementById('stats');
  if (messages.length === 0) { statsEl.style.display = 'none'; return; }
  statsEl.style.display = 'flex';
  document.getElementById('stat-total').textContent = messages.length;
  document.getElementById('stat-pro').textContent   = messages.filter(m => m.relation === 1).length;
  document.getElementById('stat-con').textContent   = messages.filter(m => m.relation === -1).length;
  document.getElementById('stat-root').textContent  = messages.filter(m => m.original === 0 || m.original === m.id).length;
}

// ── Tree rendering ─────────────────────────────────────────────────────────

function render(messages) {
  const treeEl  = document.getElementById('tree');
  const emptyEl = document.getElementById('empty-state');

  if (messages.length === 0) {
    treeEl.innerHTML = '';
    emptyEl.style.display = '';
    return;
  }
  emptyEl.style.display = 'none';

  // Build id → message map
  const byId = {};
  messages.forEach(m => byId[m.id] = m);

  // Build children map
  const children = {};
  messages.forEach(m => { children[m.id] = []; });

  // Roots: original === 0 (or self-referential)
  const roots = [];
  messages.forEach(m => {
    const isRoot = m.original === 0 || m.original === m.id || !byId[m.original];
    if (isRoot) {
      roots.push(m);
    } else {
      if (!children[m.original]) children[m.original] = [];
      children[m.original].push(m);
    }
  });

  // Sort roots by timestamp ascending
  roots.sort((a, b) => a.timestamp - b.timestamp);

  // Render
  treeEl.innerHTML = '';
  roots.forEach(root => {
    const block = renderSubtree(root, byId, children, true);
    treeEl.appendChild(block);
  });
}

function renderSubtree(message, byId, children, isTopLevel) {
  const wrapper = document.createElement('div');
  wrapper.className = 'node-block';

  // Card
  const card = renderCard(message);

  if (isTopLevel) {
    // Root nodes: no connector, just the card + children below
    wrapper.appendChild(card);
  } else {
    wrapper.appendChild(card);
  }

  // Children
  const kids = (children[message.id] || []).slice().sort((a, b) => a.timestamp - b.timestamp);
  if (kids.length > 0) {
    const childrenWrap = document.createElement('div');
    childrenWrap.className = 'children-wrap';
    kids.forEach(child => {
      const childBlock = renderSubtree(child, byId, children, false);
      childrenWrap.appendChild(childBlock);
    });
    wrapper.appendChild(childrenWrap);
  }

  return wrapper;
}

function renderCard(m) {
  const relation = m.relation ?? 0;
  const cls = relation === 1 ? 'pro' : relation === -1 ? 'con' : 'root';

  const card = document.createElement('div');
  card.className = `node-card ${cls}`;
  card.dataset.id = m.id;

  // Relation pill
  const pillLabel = cls === 'pro' ? '▲ pro' : cls === 'con' ? '▼ con' : '● root';
  const pill = document.createElement('div');
  pill.className = `relation-pill ${cls}`;
  pill.textContent = pillLabel;
  card.appendChild(pill);

  // Content
  const content = document.createElement('div');
  content.className = 'node-content';
  content.textContent = m.content;
  card.appendChild(content);

  // Meta
  const meta = document.createElement('div');
  meta.className = 'node-meta';

  const author = document.createElement('span');
  author.className = 'node-author';
  author.textContent = `@${m.author}`;
  meta.appendChild(author);

  const id = document.createElement('span');
  id.className = 'node-id';
  id.textContent = `#${m.id}`;
  meta.appendChild(id);

  // Reactions
  if (m.reactions && m.reactions.length > 0) {
    const reactEl = document.createElement('div');
    reactEl.className = 'node-reactions';

    // Group reactions
    const groups = {};
    m.reactions.forEach(r => {
      groups[r.reaction] = (groups[r.reaction] || 0) + 1;
    });

    Object.entries(groups).forEach(([emoji, count]) => {
      const badge = document.createElement('span');
      badge.className = 'reaction-badge';
      badge.textContent = count > 1 ? `${emoji} ${count}` : emoji;
      reactEl.appendChild(badge);
    });

    meta.appendChild(reactEl);
  }

  card.appendChild(meta);
  return card;
}
</script>
</body>
</html>
