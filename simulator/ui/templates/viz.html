<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ folder }} · Argument Tree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0d11;
      --surface:  #111318;
      --card:     #181c24;
      --border:   #252b38;
      --border2:  #1e2430;

      --pro:      #1fca8a;
      --pro-dim:  rgba(31,202,138,.12);
      --con:      #f05a5a;
      --con-dim:  rgba(240,90,90,.12);
      --root:     #6c9fff;
      --root-dim: rgba(108,159,255,.12);

      --text:     #dde3f0;
      --muted:    #5a6480;
      --dim:      #343c52;

      --mono: 'JetBrains Mono', monospace;
      --sans: 'Sora', sans-serif;
      --r: 10px;
      --indent: 38px;
      --arm-w: 2px;
    }

    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.6;
    }

    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .hdr {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,13,17,.93);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 54px;
      display: flex; align-items: center; gap: 14px;
    }
    .hdr-logo   { font-family: var(--mono); font-size: .72rem; color: var(--muted); letter-spacing: .1em; }
    .hdr-folder {
      font-family: var(--mono); font-size: .76rem;
      color: var(--root);
      background: rgba(108,159,255,.09); border: 1px solid rgba(108,159,255,.18);
      border-radius: 5px; padding: 2px 10px;
    }
    .hdr-spacer { flex: 1; }
    .hdr-stats  { display: flex; gap: 16px; }
    .stat {
      font-family: var(--mono); font-size: .68rem;
      color: var(--muted); display: flex; align-items: center; gap: 5px;
    }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── Controls ────────────────────────────────────────────────────────── */
    .controls {
      padding: 11px 28px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--border2);
      background: var(--surface);
    }
    .ctrl-lbl { font-size: .7rem; color: var(--muted); margin-right: 2px; white-space: nowrap; }
    .ctrl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

    .cb {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted);
      padding: 4px 12px; font-family: var(--sans); font-size: .74rem; font-weight: 500;
      cursor: pointer; transition: border-color .14s, color .14s, background .14s;
      white-space: nowrap;
    }
    .cb:hover  { border-color: var(--root); color: var(--root); }
    .cb.active { border-color: var(--root); color: var(--root); background: rgba(108,159,255,.07); }
    .cb.pro    { --root: var(--pro); }
    .cb.con    { --root: var(--con); }

    .search-wrap {
      margin-left: auto; position: relative; display: flex; align-items: center;
    }
    .search-wrap svg { position: absolute; left: 9px; pointer-events: none; color: var(--muted); }
    .search-in {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      padding: 5px 11px 5px 30px; font-family: var(--sans); font-size: .76rem;
      outline: none; width: 210px; transition: border-color .14s;
    }
    .search-in:focus       { border-color: var(--root); }
    .search-in::placeholder { color: var(--muted); }

    /* ── Main ────────────────────────────────────────────────────────────── */
    .main {
      max-width: 900px; margin: 0 auto;
      padding: 30px 24px 80px;
    }

    /* ── Error ───────────────────────────────────────────────────────────── */
    .err-box {
      margin: 60px auto; max-width: 460px;
      background: rgba(240,90,90,.07); border: 1px solid rgba(240,90,90,.22);
      border-radius: 12px; padding: 28px 24px; text-align: center;
    }
    .err-icon  { font-size: 2rem; margin-bottom: 12px; }
    .err-title { font-weight: 600; margin-bottom: 6px; }
    .err-msg   { font-size: .82rem; color: var(--muted); font-family: var(--mono); }

    /* ── Tree ────────────────────────────────────────────────────────────── */
    .tree-list { display: flex; flex-direction: column; gap: 20px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: none; }
    }
    .thread { animation: fadeUp .28s ease both; }
    .thread:nth-child(1)  { animation-delay: .02s; }
    .thread:nth-child(2)  { animation-delay: .05s; }
    .thread:nth-child(3)  { animation-delay: .08s; }
    .thread:nth-child(4)  { animation-delay: .11s; }
    .thread:nth-child(n+5){ animation-delay: .14s; }

    /* ── Node ────────────────────────────────────────────────────────────── */
    .node-card {
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--card);
      padding: 12px 15px;
      position: relative; overflow: hidden;
      transition: border-color .16s, transform .12s;
    }
    .node-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .node-card:hover { transform: translateX(2px); }

    .node-card.root { border-color: rgba(108,159,255,.25); background: linear-gradient(135deg, var(--card) 0%, var(--root-dim) 100%); }
    .node-card.root::before { background: var(--root); }
    .node-card.root:hover   { border-color: rgba(108,159,255,.45); }

    .node-card.pro  { border-color: rgba(31,202,138,.18); background: linear-gradient(135deg, var(--card) 0%, var(--pro-dim) 100%); }
    .node-card.pro::before  { background: var(--pro); }
    .node-card.pro:hover    { border-color: rgba(31,202,138,.38); }

    .node-card.con  { border-color: rgba(240,90,90,.18); background: linear-gradient(135deg, var(--card) 0%, var(--con-dim) 100%); }
    .node-card.con::before  { background: var(--con); }
    .node-card.con:hover    { border-color: rgba(240,90,90,.38); }

    /* ── Node meta row ───────────────────────────────────────────────────── */
    .node-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; flex-wrap: wrap; }

    .badge {
      font-family: var(--mono); font-size: .6rem; font-weight: 500;
      padding: 1px 7px; border-radius: 4px; letter-spacing: .04em; flex-shrink: 0;
    }
    .badge.root { color: var(--root); background: rgba(108,159,255,.12); }
    .badge.pro  { color: var(--pro);  background: rgba(31,202,138,.12);  }
    .badge.con  { color: var(--con);  background: rgba(240,90,90,.12);   }

    .author {
      font-family: var(--mono); font-size: .67rem; color: var(--muted);
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 7px;
    }
    .msg-id { font-family: var(--mono); font-size: .59rem; color: var(--dim); }
    .ts     { font-family: var(--mono); font-size: .6rem; color: var(--dim); margin-left: auto; }

    /* ── Content ─────────────────────────────────────────────────────────── */
    .node-body { font-size: .86rem; line-height: 1.65; color: var(--text); }
    .node-body mark { background: rgba(255,220,50,.2); color: #ffd83a; border-radius: 2px; padding: 0 2px; }

    /* ── Topics ──────────────────────────────────────────────────────────── */
    .topics { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .topic  {
      font-size: .63rem; font-family: var(--mono);
      background: rgba(108,159,255,.07); border: 1px solid rgba(108,159,255,.14);
      color: rgba(108,159,255,.65); border-radius: 20px; padding: 1px 7px;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .node-foot {
      display: flex; align-items: center; gap: 9px;
      margin-top: 9px; padding-top: 8px;
      border-top: 1px solid var(--border2);
      flex-wrap: wrap;
    }
    .child-cnt {
      font-family: var(--mono); font-size: .65rem;
      display: flex; gap: 6px; color: var(--muted);
    }
    .child-cnt .p { color: var(--pro); }
    .child-cnt .c { color: var(--con); }

    .reactions { display: flex; gap: 4px; }
    .reaction  {
      font-size: .7rem; background: rgba(255,255,255,.04);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 1px 7px; color: var(--muted);
    }

    .foot-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted);
      font-family: var(--mono); font-size: .66rem;
      padding: 2px 9px; cursor: pointer; transition: all .14s;
      display: flex; align-items: center; gap: 4px; margin-left: auto;
    }
    .foot-btn:hover { border-color: var(--root); color: var(--root); }
    .foot-btn + .foot-btn { margin-left: 0; }

    /* ── Vars panel ──────────────────────────────────────────────────────── */
    .vars-panel {
      margin-top: 8px; display: none;
      background: rgba(0,0,0,.22); border: 1px solid var(--border2);
      border-radius: 6px; padding: 8px 11px;
    }
    .vars-panel.open { display: block; }
    .vars-grid { display: flex; flex-wrap: wrap; gap: 4px 14px; }
    .var-kv    { font-family: var(--mono); font-size: .64rem; }
    .var-k     { color: var(--dim); }
    .var-v     { color: var(--text); }

    /* ── Children connector ──────────────────────────────────────────────── */
    .children {
      position: relative;
      padding-left: var(--indent);
      margin-top: 4px;
    }
    .children::before {
      content: '';
      position: absolute; left: 13px; top: 0; bottom: 12px;
      width: var(--arm-w); background: var(--border); border-radius: 1px;
    }
    .child-item {
      position: relative; margin-bottom: 4px;
    }
    .child-item::before {
      content: '';
      position: absolute;
      left: calc(-1 * var(--indent) + 14px); top: 21px;
      width: calc(var(--indent) - 14px); height: var(--arm-w);
      background: var(--border);
    }

    /* ── Empty ───────────────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 70px 20px; color: var(--muted); font-size: .84rem; }
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header class="hdr">
  <span class="hdr-logo">SIM·VIZ</span>
  <span class="hdr-folder">{{ folder }}</span>
  <div class="hdr-spacer"></div>
  <div class="hdr-stats" id="hdr-stats"></div>
</header>

{% if error %}
<!-- ── Error state ────────────────────────────────────────────────────────── -->
<div class="main">
  <div class="err-box">
    <div class="err-icon">⚠</div>
    <div class="err-title">Could not load messages</div>
    <div class="err-msg">{{ error }}</div>
  </div>
</div>
{% else %}

<!-- ── Controls ──────────────────────────────────────────────────────────── -->
<div class="controls">
  <span class="ctrl-lbl">Show:</span>
  <button class="cb active" id="btn-all" onclick="filterRel(null)">All</button>
  <button class="cb pro"    id="btn-pro" onclick="filterRel(1)">✦ Supports</button>
  <button class="cb con"    id="btn-con" onclick="filterRel(-1)">✗ Contradicts</button>

  <div class="ctrl-sep"></div>
  <button class="cb" onclick="expandAll()">Expand all</button>
  <button class="cb" onclick="collapseAll()">Collapse all</button>

  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-in" id="search-in" type="text"
           placeholder="Search messages…" oninput="onSearch(this.value)">
  </div>
</div>

<!-- ── Tree ──────────────────────────────────────────────────────────────── -->
<main class="main" id="tree-root">
  <div class="empty">Loading…</div>
</main>

<script>
// ── Injected data ────────────────────────────────────────────────────────
const MSGS   = {{ messages_json | safe }};
const FOLDER = {{ folder_json   | safe }};

// ── Index ────────────────────────────────────────────────────────────────
const byId     = {};
const kids     = {};   // id → [msg]

for (const m of MSGS) {
  byId[m.message.id] = m;
  kids[m.message.id] = kids[m.message.id] || [];
}

const roots = [];
for (const m of MSGS) {
  const rel = +(m.variables?.relation ?? 0);
  if (rel === 0) {
    roots.push(m);
  } else {
    const pid = m.message.original;
    if (pid != null && byId[pid]) {
      (kids[pid] = kids[pid] || []).push(m);
    } else {
      roots.push(m);  // orphan
    }
  }
}

const byTs = (a, b) => (a.message.timestamp || 0) - (b.message.timestamp || 0);
roots.sort(byTs);
for (const id in kids) kids[id].sort(byTs);

// ── State ────────────────────────────────────────────────────────────────
let activeRel  = null;
let collapsed  = {};
let searchQ    = '';

// ── Escape ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('tree-root');
  if (!MSGS.length) {
    el.innerHTML = '<div class="empty">No messages in log.</div>';
    updateStats();
    return;
  }

  const visible = activeRel === null
    ? roots
    : roots.filter(r => subtreeHasRel(r, activeRel));

  if (!visible.length) {
    el.innerHTML = '<div class="empty">No messages match.</div>';
    updateStats();
    return;
  }

  el.innerHTML = `<div class="tree-list">${
    visible.map(r => `<div class="thread">${renderNode(r)}</div>`).join('')
  }</div>`;

  updateStats();
  if (searchQ) applySearch(searchQ);
}

function subtreeHasRel(m, rel) {
  for (const c of (kids[m.message.id] || [])) {
    if (+(c.variables?.relation ?? 0) === rel) return true;
    if (subtreeHasRel(c, rel)) return true;
  }
  return false;
}

function renderNode(m) {
  const id      = m.message.id;
  const rel     = +(m.variables?.relation ?? 0);
  const ck      = kids[id] || [];
  const isColl  = collapsed[id] ?? false;

  const relCls  = rel === 0 ? 'root' : rel === 1 ? 'pro' : 'con';
  const relLbl  = rel === 0 ? 'ROOT' : rel === 1 ? '✦ PRO' : '✗ CON';

  const ts = m.message.timestamp
    ? new Date(m.message.timestamp).toLocaleString([],
        { month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit' })
    : '';

  const proC = ck.filter(c => +(c.variables?.relation ?? 0) === 1).length;
  const conC = ck.filter(c => +(c.variables?.relation ?? 0) === -1).length;

  const reactions = (m.message.reactions || [])
    .map(r => `<span class="reaction">${esc(String(r))}</span>`).join('');

  const topics = (m.topics || [])
    .map(t => `<span class="topic">${esc(String(t))}</span>`).join('');

  const vars = m.variables
    ? Object.entries(m.variables)
        .filter(([k]) => k !== 'relation')
        .map(([k,v]) =>
          `<span class="var-kv"><span class="var-k">${esc(k)}: </span><span class="var-v">${esc(String(v))}</span></span>`)
        .join('')
    : '';
  const hasVars = vars.length > 0;

  const foot = (ck.length || reactions || hasVars) ? `
    <div class="node-foot">
      ${ck.length ? `<span class="child-cnt">
        ${proC ? `<span class="p">▲${proC}</span>` : ''}
        ${conC ? `<span class="c">▼${conC}</span>` : ''}
        ${!proC && !conC ? `<span>${ck.length} repl.</span>` : ''}
      </span>` : ''}
      ${reactions ? `<span class="reactions">${reactions}</span>` : ''}
      ${hasVars ? `<button class="foot-btn" onclick="toggleVars(${id},event)">⬡ vars</button>` : ''}
      ${ck.length ? `<button class="foot-btn" onclick="toggleNode(${id},event)">${isColl ? '▸ expand' : '▾ collapse'}</button>` : ''}
    </div>` : '';

  const varsPanel = hasVars
    ? `<div class="vars-panel" id="vp-${id}"><div class="vars-grid">${vars}</div></div>`
    : '';

  const card = `
    <div class="node-card ${relCls}" id="card-${id}">
      <div class="node-meta">
        <span class="badge ${relCls}">${relLbl}</span>
        <span class="author">${esc(m.message.author)}</span>
        <span class="msg-id">#${id}</span>
        ${ts ? `<span class="ts">${esc(ts)}</span>` : ''}
      </div>
      <div class="node-body" id="body-${id}">${esc(m.message.content)}</div>
      ${topics ? `<div class="topics">${topics}</div>` : ''}
      ${varsPanel}
      ${foot}
    </div>`;

  let childrenHtml = '';
  if (ck.length && !isColl) {
    childrenHtml = `<div class="children">${
      ck.map(c => `<div class="child-item">${renderNode(c)}</div>`).join('')
    }</div>`;
  }

  return `<div class="node-wrap" data-id="${id}" data-rel="${rel}">${card}${childrenHtml}</div>`;
}

// ── Interactions ──────────────────────────────────────────────────────────
function toggleNode(id, e) {
  e.stopPropagation();
  collapsed[id] = !collapsed[id];
  render();
}
function toggleVars(id, e) {
  e.stopPropagation();
  document.getElementById(`vp-${id}`)?.classList.toggle('open');
}
function expandAll()   { collapsed = {};  render(); }
function collapseAll() {
  for (const m of MSGS) if ((kids[m.message.id]||[]).length) collapsed[m.message.id] = true;
  render();
}
function filterRel(rel) {
  activeRel = rel;
  document.getElementById('btn-all').classList.toggle('active', rel === null);
  document.getElementById('btn-pro').classList.toggle('active', rel === 1);
  document.getElementById('btn-con').classList.toggle('active', rel === -1);
  render();
}

// ── Search ────────────────────────────────────────────────────────────────
function onSearch(q) {
  searchQ = q.trim().toLowerCase();
  if (!searchQ) {
    document.querySelectorAll('.thread').forEach(t => t.style.opacity = '');
    document.querySelectorAll('.node-body').forEach(el => {
      el.innerHTML = esc(el.dataset.raw || el.textContent);
    });
    return;
  }
  applySearch(searchQ);
}

function applySearch(q) {
  document.querySelectorAll('.node-body').forEach(el => {
    if (!el.dataset.raw) el.dataset.raw = el.textContent;
    const raw = el.dataset.raw;
    el.innerHTML = esc(raw).replace(
      new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'),
      m => `<mark>${m}</mark>`
    );
  });
  document.querySelectorAll('.thread').forEach(t => {
    const match = [...t.querySelectorAll('.node-body')]
      .some(el => el.innerHTML.includes('<mark>'));
    t.style.opacity = match ? '1' : '0.15';
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats() {
  const total = MSGS.length;
  const rs    = MSGS.filter(m => +(m.variables?.relation ?? 0) === 0).length;
  const pros  = MSGS.filter(m => +(m.variables?.relation ?? 0) === 1).length;
  const cons  = MSGS.filter(m => +(m.variables?.relation ?? 0) === -1).length;
  document.getElementById('hdr-stats').innerHTML = `
    <span class="stat"><span class="stat-dot" style="background:var(--root)"></span>${rs} root${rs!==1?'s':''}</span>
    <span class="stat"><span class="stat-dot" style="background:var(--pro)"></span>${pros} pro</span>
    <span class="stat"><span class="stat-dot" style="background:var(--con)"></span>${cons} con</span>
    <span class="stat" style="margin-left:4px;color:var(--dim)">${total} total</span>
  `;
}

render();
</script>
{% endif %}
</body>
</html>
