<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ folder }} · Agent Metrics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/visualizer.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/agts.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<header class="hdr">
  <div class="logo">sim<span>/</span>visualizer</div>
  <div class="hdr-sep"></div>
  <span class="hdr-folder">{{ folder }}</span>
  <div class="hdr-spacer"></div>
  <div class="hdr-count" id="hdr-count"
       style="font-family:var(--mono);font-size:.75rem;color:var(--sub)"></div>
</header>

{% if error %}
<div class="err-wrap">
  <div class="err-box">
    <div class="err-icon">⚠</div>
    <div class="err-title">Could not load agent logs</div>
    <div class="err-msg">{{ error }}</div>
  </div>
</div>
{% else %}

<div class="stats-bar" id="stats-bar"></div>

<div class="agts-body">

  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="sb-section">
        <div class="sb-label">Plot type</div>
        <div class="plot-types" id="plot-types"></div>
      </div>

      <div class="sb-divider"></div>

      <div class="sb-section">
        <div class="sb-label">Agents</div>
        <div class="scroll-list" id="agent-list"></div>
      </div>

      <div class="sb-divider"></div>

      <div class="sb-section">
        <div class="sb-label">Variables &nbsp;<span style="color:var(--dim);font-size:.6rem">(click to chart)</span></div>
        <div class="scroll-list" id="var-list"></div>
      </div>

    </div>
    <div class="sb-footer">
      <button class="reset-btn" onclick="resetAll()">↺ Reset all</button>
    </div>
  </aside>

  <div class="chart-area">
    <div class="chart-grid" id="chart-grid">
      <div class="placeholder">
        <div class="placeholder-icon">⬡</div>
        <div class="placeholder-msg">No variables selected.</div>
        <div class="placeholder-hint">Pick variables from the sidebar to plot them.</div>
      </div>
    </div>
  </div>

</div>

<script>
const AGENTS_DATA = {{ agents_json | safe }};
const FOLDER      = {{ folder_json | safe }};
</script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/agts.js') }}"></script>

{% endif %}
</body>
</html>
