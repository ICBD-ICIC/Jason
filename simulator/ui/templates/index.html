<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation Configurator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/configurator.css') }}">
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">sim<span>/</span>generator</div>
    <div class="spacer"></div>
    <button class="btn-gen" id="btn-gen" onclick="generate()">Generate Files</button>
  </header>

  <aside>
    <div class="sb-section">
      <div class="field">
        <label>Root Folder</label>
        <input type="text" id="output-folder" value="generated">
      </div>
      <div class="field">
        <label>MAS Name</label>
        <input type="text" id="mas-name" value="default_mas">
      </div>
      <div class="field">
        <label class="checkbox-label">
          <input type="checkbox" id="mind-inspector">
          Include Mind Inspector
        </label>
      </div>
      <div class="field">
        <label class="checkbox-label">
          <input type="checkbox" id="silent-logging">
          Silent Logging (file only)
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sb-tabs">
      <button class="sb-tab active" id="tab-agents" onclick="switchTab('agents')">Agents</button>
      <button class="sb-tab"        id="tab-init"   onclick="switchTab('init')">Environment</button>
    </div>

    <div id="sb-agents" class="sb-section sb-panel sb-panel--active">
      <div class="agent-list" id="agent-list"></div>
      <button class="btn-add" onclick="addType()"><span>+</span> Add Agent Type</button>
    </div>

    <div id="sb-init" class="sb-section sb-panel">
      <div class="init-nav" id="init-nav"></div>
    </div>
  </aside>

  <main id="main-panel">
    <div class="empty-state">
      <div class="icon">&#9881;</div>
      <p>Add an agent type or select an initializer to begin</p>
    </div>
  </main>

</div>

<!-- Output modal -->
<div class="modal-bg" id="out-modal">
  <div class="modal">
    <div class="modal-hd">
      <h3>Files Generated</h3>
      <button class="modal-close" onclick="closeModal('out-modal')">&#x2715;</button>
    </div>
    <div class="modal-body" id="out-modal-body"></div>
  </div>
</div>

<!-- Add-column modal -->
<div class="col-modal-bg" id="col-modal">
  <div class="col-modal">
    <h4>Add Attribute Column</h4>
    <div class="field">
      <label>Attribute name — use <code>functor:label</code> for multiple facts with the same functor</label>
      <input type="text" id="col-name-input" placeholder="e.g. prob_malicious  or  debate:1"
        onkeydown="if(event.key==='Enter') confirmAddCol()">
    </div>
    <div class="col-modal-actions">
      <button class="btn-ghost"   onclick="closeModal('col-modal')">Cancel</button>
      <button class="btn-primary" onclick="confirmAddCol()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/state.js') }}"></script>
<script src="{{ url_for('static', filename='js/render.js') }}"></script>
<script src="{{ url_for('static', filename='js/agents.js') }}"></script>
<script src="{{ url_for('static', filename='js/network.js') }}"></script>
<script src="{{ url_for('static', filename='js/initializers.js') }}"></script>
<script src="{{ url_for('static', filename='js/modals.js') }}"></script>
</body>
</html>
